<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    body{
      background-color:hsl(212, 45%, 89%) ;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;

    }
   .qrcode{
    border-radius: 16px;
    max-width: 200px;
    

   }
   .card{
    width: 320px;
    background-color:hsl(0, 0%, 100%) ;
    border-radius: 16px;
    padding: 16px;
    text-align: center;

    
    
   }
   .main-par,.main-head{
    font-size: 15px;
    font-family: "Outfit", sans-serif ;
    font-weight: 400,700 ;
   }
   .main-head{
    color: hsl(218, 44%, 22%);
   }
   
  </style>
</head>
<body>
  <div class="card">
    <img src="./images/image-qr-code.png" alt="icon" class="qrcode">
    <h3 class="main-head">Improve your front-end skills by buikding projects</h3>
    <p class="main-par">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>    
  </div>




  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Mouiz</a>.
  </footer>
</body>
</html>
